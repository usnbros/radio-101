name: Build LaTeX document and Create Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_latex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Get the version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          fi

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          args: >-
            -pdf 
            -file-line-error 
            -halt-on-error 
            -interaction=nonstopmode
          extra_system_packages: |
            graphviz
            ghostscript

      - name: Rename output file
        if: success()
        run: |
          mv main.pdf radio-101-${{ steps.get_version.outputs.VERSION }}.pdf

      - name: Check for compilation errors
        if: failure()
        run: |
          echo "LaTeX compilation failed. Displaying log file:"
          cat main.log

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: radio-101-${{ steps.get_version.outputs.VERSION }}.pdf
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            Release of Radio 101 version ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false

      - name: Get Release URL
        id: get_release_url
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          RELEASE_URL=$(curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | jq -r '.html_url')
          echo "RELEASE_URL=${RELEASE_URL}" >> $GITHUB_OUTPUT

      - name: Update Readme
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Check if Readme.md exists, create it if it doesn't
          if [ ! -f Readme.md ]; then
            echo "# Radio 101" > Readme.md
            echo "Creating new Readme.md file"
          fi

          # Remove existing latest build line if it exists
          sed -i '/\[Latest PDF Build\]/d' Readme.md

          # Add new latest build line at the end of the file
          echo "" >> Readme.md
          echo "[Latest PDF Build](${{ steps.get_release_url.outputs.RELEASE_URL }})" >> Readme.md

          # Check if there are changes to commit
          if git diff --exit-code; then
            echo "No changes to Readme.md"
          else
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add Readme.md
            git commit -m "Update Readme with latest PDF release link"
            git push
          fi
        shell: bash
