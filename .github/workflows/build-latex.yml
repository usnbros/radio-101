name: Build LaTeX document and Publish PDF
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_latex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          args: >-
            -pdf 
            -file-line-error 
            -halt-on-error 
            -interaction=nonstopmode
          extra_system_packages: |
            graphviz
            ghostscript

      - name: Check for compilation errors
        if: failure()
        run: |
          echo "LaTeX compilation failed. Displaying log file:"
          cat main.log

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git checkout --orphan gh-pages
          git rm -rf .
          mv main.pdf radio-101.pdf
          echo "PDF file contents:" >> index.html
          echo "<a href='radio-101.pdf'>Download PDF</a>" >> index.html
          git add radio-101.pdf index.html
          git commit -m "Publish PDF"
          git push -f origin gh-pages

      - name: Debug GitHub Pages
        run: |
          echo "Checking gh-pages branch:"
          git checkout gh-pages
          ls -la
          echo "Contents of index.html:"
          cat index.html
          echo "Verifying PDF file:"
          file radio-101.pdf

      - name: Check GitHub Pages settings
        run: |
          echo "Please ensure that GitHub Pages is enabled for this repository."
          echo "Go to repository Settings -> Pages"
          echo "Source should be set to 'Deploy from a branch'"
          echo "Branch should be set to 'gh-pages' and folder to '/ (root)'"
