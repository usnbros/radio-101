name: Build LaTeX document
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_latex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          fi

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          args: >-
            -pdf 
            -file-line-error 
            -halt-on-error 
            -interaction=nonstopmode
            -jobname="radio-101-${{ steps.get_version.outputs.VERSION }}"
          extra_system_packages: |
            graphviz
            ghostscript

      - name: Check for compilation errors
        if: failure()
        run: |
          echo "LaTeX compilation failed. Displaying log file:"
          cat "radio-101-${{ steps.get_version.outputs.VERSION }}.log"

      - name: Create Release and Upload Asset
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: "./radio-101-${{ steps.get_version.outputs.VERSION }}.pdf"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PDF file as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PDF
          path: "radio-101-${{ steps.get_version.outputs.VERSION }}.pdf"
