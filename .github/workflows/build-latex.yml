name: Build LaTeX document
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
jobs:
  build_latex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # ... (previous steps remain the same)
      
      - name: Update Readme
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Fetch the latest changes from the remote
          git fetch origin main
          
          # Create a new branch based on the latest main
          git checkout -b update-readme-${{ github.run_id }} origin/main
          
          # Update or add the PDF link
          NEW_LINK="[Latest PDF Build](${{ steps.get_artifact_url.outputs.ARTIFACT_URL }})"
          if grep -q "\[Latest PDF Build\]" Readme.md; then
            sed -i 's|\[Latest PDF Build\].*|'"$NEW_LINK"'|' Readme.md
          else
            echo -e "\n$NEW_LINK" >> Readme.md
          fi
          
          # Check if there are changes
          if git diff --exit-code; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Commit and push changes
          git add Readme.md
          git commit -m "Update Readme with latest PDF link"
          git push origin update-readme-${{ github.run_id }}
          
      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet origin/main; then
            echo "No changes to create a PR for"
          else
            pr_url=$(gh pr create --title "Update README with latest PDF link" --body "Automated update of the PDF link in README" --base main --head update-readme-${{ github.run_id }})
            echo "Created PR: $pr_url"
          fi
